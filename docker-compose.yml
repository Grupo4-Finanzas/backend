services:
  postgres:
    image: postgres:16
    container_name: finanzas-postgres
    environment:
      POSTGRES_DB: finanzas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - finanzas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finanzas"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finanzas-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/finanzas
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-this-secret-key-to-at-least-32-characters-long-for-hs256
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "8080:8080"

volumes:
  finanzas_pgdata:
