services:
  postgres:
    image: postgres:16
    container_name: finanzas-postgres
    environment:
      POSTGRES_DB: finanzas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - finanzas_pgdata:/var/lib/postgresql/data

volumes:
  finanzas_pgdata:
